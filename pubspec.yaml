name: nutrifit
description: "NutriFit — Diario de alimentación y recetario inteligente"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0

  # State Management
  flutter_riverpod: ^3.3.2

  # Routing
  go_router: ^17.3.0

  # UI
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2

  # Utils
  uuid: ^4.5.3
  intl: ^0.20.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
